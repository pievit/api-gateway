services:
  api-gateway:
    build:
      context: ./api-gateway/
    container_name: api-gateway
    image: pievit/api-gateway:latest
    network_mode: bridge
    environment:
      URI_UTENTI: http://172.17.0.4:8080/
      URI_PRENOTAZIONE: http://microservizi-prenotazioni:8080/
      URI_FRONTED: http://172.17.0.2:8080/
    ports:
      - "8080:8080"
