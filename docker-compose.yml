services:
  api-gateway:
    build:
      context: ./api-gateway/
    container_name: api-gateway
    image: pievit/api-gateway:latest
    environment:
      - URI_UTENTI =  http://localhost:8081/
      - URI_PRENOTAZIONE =  http://localhost:8082/
      - URI_FRONTED = http://localhost:8083/
    ports:
      - "8080:8080"
    networks:
      - opnet

networks:
  opnet:
    driver: bridge
