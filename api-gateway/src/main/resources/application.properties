spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.routes[0].id=microservizi_utenti
spring.cloud.gateway.routes[0].uri=lb://microservizi_utenti
spring.cloud.gateway.routes[0].predicates[0]=Path=api/utenti/**
spring.cloud.gateway.routes[1].id=microservizi_prenotazione
spring.cloud.gateway.routes[1].uri=lb://microservizi_prenotazione
spring.cloud.gateway.routes[1].predicates[0]=Path=api/prenotazioni/**
spring.cloud.kubernetes.config.enabled=false
spring.application.name=api-gateway
server.port=8080
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

