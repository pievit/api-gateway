apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    io.kompose.service: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api-gateway
  strategy: { }
  template:
    metadata:
      labels:
        io.kompose.service: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: pievit/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources: { }
          env:
            - name: eureka.client.serviceUrl.defaultZone
              value: http://localhost:8761/eureka/
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    io.kompose.service: api-gateway
spec:
  selector:
    io.kompose.service: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
