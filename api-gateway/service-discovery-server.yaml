apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery-server
  labels:
    io.kompose.service: service-discovery-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: service-discovery-server
  template:
    metadata:
      labels:
        io.kompose.service: service-discovery-server
    spec:
      containers:
        - name: service-discovery-server
          image: pievit/service-discovery-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery-server
  labels:
    io.kompose.service: service-discovery-server
spec:
  type: LoadBalancer
  selector:
    io.kompose.service: service-discovery-server
  ports:
    - name: eureka
      port: 8761
      targetPort: 8761