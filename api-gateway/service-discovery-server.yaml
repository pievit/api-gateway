apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery-server
  labels:
    app: service-discovery-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-discovery-server
  template:
    metadata:
      labels:
        app: service-discovery-server
    spec:
      containers:
        - name: service-discovery-server
          image: pievit/service-discovery-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery-server
  namespace: default
spec:
  selector:
    app: service-discovery-server
  ports:
    - port: 8761
      targetPort: 8761